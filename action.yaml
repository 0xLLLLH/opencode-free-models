name: 'Opencode Free Model Resolver'
description: 'Dynamically resolves the latest non-deprecated free models for specified providers from models.dev'
author: '0xLLLLH'

# 1. Define input parameters (makes the Action more reusable and flexible)
inputs:
  providers:
    description: 'Comma-separated list of allowed providers'
    required: false
    default: 'opencode'
  fallback:
    description: 'Fallback model ID when no free models are resolved'
    required: false
    default: 'openrouter/free'
  pick:
    description: 'How to pick a model from the list ("first" or "random")'
    required: false
    default: 'first'

# 2. Define output parameters (for downstream steps to consume)
outputs:
  model_id:
    description: 'The resolved final available model ID'
    value: ${{ steps.filter-model.outputs.MODEL_ID }}

runs:
  using: 'composite' # Declares this as a composite reusable Action
  steps:
    - name: Fetch and Filter Free Model
      id: filter-model
      shell: bash # Each run in a composite Action must explicitly specify shell
      run: |
        # Convert comma-separated input string to JQ array for precise matching
        RESOLVED_MODEL=$(curl -s --max-time 3 https://models.dev/api.json | jq -r --arg provs "${{ inputs.providers }}" '
          ($provs | split(",")) as $allowed |
          to_entries[] |
          select(.key as $k | ($allowed | index($k)) != null) |
          .key as $prov |
          .value.models? | objects |
          to_entries[] |
          select((.key | test("-free|:free")) and .value.status != "deprecated") |
          "\($prov)/\(.key)"
        ' 2>/dev/null | { if [ "${{ inputs.pick }}" = "random" ]; then sort -R | head -n 1; else head -n 1; fi } )

        # Fallback logic
        if [ -z "$RESOLVED_MODEL" ] || [ "$RESOLVED_MODEL" == "null" ]; then
          echo "⚠️ No valid model matched, enabling parameterized fallback: ${{ inputs.fallback }}"
          RESOLVED_MODEL="${{ inputs.fallback }}"
        fi

        echo "Successfully resolved model ID: $RESOLVED_MODEL"
        echo "MODEL_ID=$RESOLVED_MODEL" >> $GITHUB_OUTPUT
